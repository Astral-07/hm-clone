services:
  - type: web
    name: hm-clone-backend
    runtime: java
    rootDir: backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/hm-clone-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: hm-clone-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: hm-clone-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: hm-clone-db
          property: password
      - key: APP_JWT_SECRET
        value: hm-clone-super-secret-key-change-in-production-2024
      - key: APP_JWT_EXPIRATION
        value: 86400000
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://astraltechyt.github.io

databases:
  - name: hm-clone-db
    databaseName: hmclone
    user: postgres
